migrations, and tests. Prefer existing backend patterns over new abstractions.

Use Superpowers skills when their trigger matches the task:
- test-driven-development for backend behavior changes and bug fixes.
- systematic-debugging for backend failures or unexpected behavior.
- subagent-driven-development or executing-plans when following an approved
